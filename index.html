<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Debug Test</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
  body { font-family: sans-serif; padding: 24px; max-width: 400px; margin: 0 auto; background: #f1f5f9; }
  h2 { color: #0f4c75; }
  input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 10px; margin: 8px 0 16px; box-sizing: border-box; }
  button { width: 100%; padding: 14px; font-size: 16px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
  .btn-blue { background: #0f4c75; color: #fff; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-red { background: #dc2626; color: #fff; }
  #log { background: #1e293b; color: #94f7b0; padding: 16px; border-radius: 10px; font-size: 13px; font-family: monospace; min-height: 120px; white-space: pre-wrap; word-break: break-all; margin-top: 16px; }
  .step { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  label { font-weight: 600; font-size: 14px; color: #374151; }
  #status { font-size: 13px; color: #64748b; margin: 8px 0; }
</style>
</head>
<body>

<h2>🔬 OTP Debug Test</h2>
<p id="status">Firebase initializing...</p>

<!-- STEP 1 -->
<div class="step">
  <label>Step 1 — Firebase Init Check</label><br><br>
  <button class="btn-blue" onclick="checkFirebase()">Firebase Check करा</button>
</div>

<!-- STEP 2 -->
<div class="step">
  <label>Step 2 — Phone Number टाका</label>
  <input type="tel" id="phone" placeholder="10 digit number" maxlength="10">
  <button class="btn-blue" onclick="sendOTP()">Send OTP</button>
</div>

<!-- STEP 3 -->
<div class="step">
  <label>Step 3 — OTP आला तर verify करा</label>
  <input type="tel" id="otp" placeholder="6 digit OTP" maxlength="6">
  <button class="btn-green" onclick="verifyOTP()">Verify OTP</button>
</div>

<button class="btn-red" onclick="clearLog()">Log Clear करा</button>

<div id="log">Logs येथे दिसतील...\n</div>

<div id="recaptcha-container"></div>

<script>
  // ── Firebase Config ─────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyC2xQpfkeUHywfCuBQ_ycc_0AM2wx2-xcE",
    authDomain: "lifelineindia-8ebc7.firebaseapp.com",
    databaseURL: "https://lifelineindia-8ebc7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "lifelineindia-8ebc7",
    messagingSenderId: "651026634889",
    appId: "1:651026634889:web:350f03a72a775f3b954e58"
  };

  let auth = null;
  let recaptchaVerifier = null;
  let confirmationResult = null;

  function log(msg, type = 'info') {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString('en-IN');
    const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
    el.textContent += `[${time}] ${prefix} ${msg}\n`;
    el.scrollTop = el.scrollHeight;
    console.log(msg);
  }

  function clearLog() {
    document.getElementById('log').textContent = 'Log cleared...\n';
  }

  // ── Init Firebase ───────────────────────────────
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    log('Firebase init OK', 'success');
    document.getElementById('status').textContent = '✅ Firebase connected';
    document.getElementById('status').style.color = '#16a34a';
  } catch(e) {
    log('Firebase init FAILED: ' + e.message, 'error');
    document.getElementById('status').textContent = '❌ Firebase failed: ' + e.message;
    document.getElementById('status').style.color = '#dc2626';
  }

  // ── Step 1: Check ───────────────────────────────
  function checkFirebase() {
    log('--- Firebase Check ---');
    log('auth object: ' + (auth ? 'EXISTS' : 'NULL'));
    log('auth.currentUser: ' + (auth && auth.currentUser ? auth.currentUser.uid : 'null (not logged in - normal)'));
    log('window.location: ' + window.location.hostname);
    log('navigator.onLine: ' + navigator.onLine);
    log('RecaptchaVerifier available: ' + (typeof firebase.auth.RecaptchaVerifier !== 'undefined'));
  }

  // ── Step 2: Send OTP ────────────────────────────
  function sendOTP() {
    const phone = document.getElementById('phone').value.trim();
    if (!phone || phone.length !== 10) { log('10 digit number टाका', 'error'); return; }
    if (!auth) { log('Auth null!', 'error'); return; }

    log('--- OTP Send Start ---');
    log('Phone: +91' + phone);

    // Clear old recaptcha
    if (recaptchaVerifier) {
      try { recaptchaVerifier.clear(); } catch(e) { log('reCAPTCHA clear error: ' + e.message); }
      recaptchaVerifier = null;
    }

    log('reCAPTCHA बनवत आहे...');
    try {
      recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        size: 'invisible',
        callback: (token) => { log('reCAPTCHA callback OK, token length: ' + token.length, 'success'); },
        'expired-callback': () => { log('reCAPTCHA expired!', 'error'); }
      });
      log('reCAPTCHA object created OK');
    } catch(e) {
      log('reCAPTCHA create FAILED: ' + e.message, 'error');
      return;
    }

    log('reCAPTCHA render() करत आहे...');
    recaptchaVerifier.render().then(widgetId => {
      log('reCAPTCHA render OK, widgetId: ' + widgetId, 'success');
      log('signInWithPhoneNumber call करत आहे...');

      auth.signInWithPhoneNumber('+91' + phone, recaptchaVerifier)
        .then(result => {
          confirmationResult = result;
          log('OTP SENT SUCCESSFULLY! 🎉', 'success');
          log('verificationId: ' + result.verificationId.substring(0, 20) + '...', 'success');
        })
        .catch(err => {
          log('signInWithPhoneNumber FAILED:', 'error');
          log('  code: ' + err.code, 'error');
          log('  message: ' + err.message, 'error');
          try { recaptchaVerifier.clear(); } catch(e) {}
          recaptchaVerifier = null;
        });

    }).catch(e => {
      log('reCAPTCHA render FAILED: ' + e.message, 'error');
      log('  code: ' + (e.code || 'none'), 'error');
    });
  }

  // ── Step 3: Verify OTP ──────────────────────────
  function verifyOTP() {
    const otp = document.getElementById('otp').value.trim();
    if (!otp || otp.length !== 6) { log('6 digit OTP टाका', 'error'); return; }
    if (!confirmationResult) { log('आधी OTP send करा!', 'error'); return; }

    log('--- OTP Verify Start ---');
    log('OTP: ' + otp);

    confirmationResult.confirm(otp)
      .then(result => {
        log('OTP VERIFIED! UID: ' + result.user.uid, 'success');
        log('Phone: ' + result.user.phoneNumber, 'success');
      })
      .catch(err => {
        log('Verify FAILED:', 'error');
        log('  code: ' + err.code, 'error');
        log('  message: ' + err.message, 'error');
      });
  }
</script>
</body>
</html>
